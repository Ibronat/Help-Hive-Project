<!DOCTYPE html>
<html lang="en" data-theme="light">

<!--
  ============================================================
  HelpHive — signup.html (CREATE ACCOUNT)
  ============================================================
  New user registration page.
  Includes a special "Join as Expert" toggle that reveals
  an extra field for the user's field of expertise.

  BEGINNER TIP:
  We show/hide the "expert field" input based on a checkbox.
  That's a common pattern: user picks an option, more options appear.
  JavaScript handles this with an event listener.
  ============================================================
-->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpHive — Create Account</title>
  <meta name="description" content="Join HelpHive — ask questions and connect with experts." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>

<body class="auth-page">

  <!-- Minimal navbar -->
  <nav class="navbar navbar--minimal">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <span class="navbar__logo-icon" aria-hidden="true">⬡</span>
        <span class="navbar__logo-text">HelpHive</span>
      </a>
      <div class="navbar__actions">
        <button class="btn btn--icon" id="themeToggle" aria-label="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-card__header">
        <span class="auth-card__icon" aria-hidden="true">⬡</span>
        <h1 class="auth-card__title">Join HelpHive</h1>
        <p class="auth-card__sub">Help others. Get helped. Grow together.</p>
      </div>

      <!-- ACCOUNT TYPE TOGGLE: Member vs Expert -->
      <!--
        This is a visual toggle — clicking changes the signup type.
        CSS + JS make one button "active" at a time.
      -->
      <div class="account-type-toggle" role="group" aria-label="Account type">
        <button class="account-type-btn account-type-btn--active" id="typeMember" data-type="member">
          👤 Join as Member
        </button>
        <button class="account-type-btn" id="typeExpert" data-type="expert">
          ⭐ Join as Expert
        </button>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-form" id="signupForm" role="form" aria-label="Create account form">

        <!-- Name fields in a row -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="signupFirstName">First name</label>
            <input
              type="text"
              class="form-input"
              id="signupFirstName"
              placeholder="Amara"
              autocomplete="given-name"
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="signupLastName">Last name</label>
            <input
              type="text"
              class="form-input"
              id="signupLastName"
              placeholder="Osei"
              autocomplete="family-name"
              aria-required="true"
            />
          </div>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="signupUsername">Username</label>
          <div class="form-input-prefix">
            <span class="form-input-prefix__text">hh/</span>
            <input
              type="text"
              class="form-input form-input--prefixed"
              id="signupUsername"
              placeholder="amara_helps"
              autocomplete="username"
              aria-required="true"
              aria-describedby="signupUsernameError"
            />
          </div>
          <span class="form-error hidden" id="signupUsernameError" role="alert"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email address</label>
          <input
            type="email"
            class="form-input"
            id="signupEmail"
            placeholder="you@example.com"
            autocomplete="email"
            aria-required="true"
            aria-describedby="signupEmailError"
          />
          <span class="form-error hidden" id="signupEmailError" role="alert"></span>
        </div>

        <!-- Password with strength indicator -->
        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <div class="form-input-wrap">
            <input
              type="password"
              class="form-input"
              id="signupPassword"
              placeholder="At least 8 characters"
              autocomplete="new-password"
              aria-required="true"
              aria-describedby="passwordStrengthHint signupPasswordError"
            />
            <button type="button" class="form-input-toggle" id="signupPasswordToggle" aria-label="Show password">👁️</button>
          </div>
          <!-- Password strength bar — fills up as user types -->
          <div class="password-strength" id="passwordStrength" aria-live="polite">
            <div class="password-strength__bar">
              <div class="password-strength__fill" id="passwordStrengthFill"></div>
            </div>
            <span class="password-strength__label" id="passwordStrengthLabel" id="passwordStrengthHint"></span>
          </div>
          <span class="form-error hidden" id="signupPasswordError" role="alert"></span>
        </div>

        <!-- Expert-only field (hidden unless "Join as Expert" is selected) -->
        <!--
          class="hidden" means this is invisible by default.
          When user clicks "Join as Expert", JS removes "hidden".
          This pattern is called "conditional form fields".
        -->
        <div class="form-group hidden" id="expertFieldGroup">
          <label class="form-label" for="signupExpertField">
            Your field of expertise ⭐
          </label>
          <input
            type="text"
            class="form-input"
            id="signupExpertField"
            placeholder="e.g. Medicine, Software Engineering, Law..."
          />
          <p class="form-hint">You'll be verified by our team after signup.</p>
        </div>

        <!-- Terms & Conditions checkbox -->
        <div class="form-check">
          <input type="checkbox" class="form-check__input" id="agreeTerms" aria-required="true" />
          <label class="form-check__label" for="agreeTerms">
            I agree to the <a href="#" class="form-check__link">Terms of Service</a> and
            <a href="#" class="form-check__link">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit -->
        <button class="btn btn--primary btn--full btn--large" id="signupSubmit">
          Create my account
        </button>

        <!-- General error -->
        <div class="auth-error hidden" id="signupError" role="alert">
          <span class="auth-error__icon" aria-hidden="true">⚠️</span>
          <span id="signupErrorMsg">Please fill in all required fields.</span>
        </div>

        <!-- Social signup -->
        <div class="auth-divider"><span>or sign up with</span></div>
        <div class="social-btns">
          <button class="btn btn--social" id="googleSignup">
            <span aria-hidden="true">🌐</span> Google
          </button>
          <button class="btn btn--social" id="githubSignup">
            <span aria-hidden="true">🐙</span> GitHub
          </button>
        </div>

      </div>
      <!-- END FORM -->

      <p class="auth-switch">
        Already have an account?
        <a href="login.html" class="auth-switch__link">Sign in</a>
      </p>

    </div>
  </main>

  <div class="toast-container" id="toastContainer" aria-live="assertive" aria-atomic="true"></div>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
